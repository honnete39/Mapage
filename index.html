<!DOCTYPE html>
<html>
<head>
    
<meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, 
         initial-scale=1.0">
    
<title>Chat Groupe</title>

<style>
body{
    margin:0;
    font-family:Arial;
}

#status{
    padding:10px;
    background:#ddd;
}

#chat{
    height:60vh;
    overflow:auto;
    border:1px solid #ccc;
    padding:10px;
}

.msg{
    margin:5px 0;
}

.system{
    color:gray;
    font-style:italic;
}

input{
    padding:10px;
}

button{
    padding:10px;
}
</style>
</head>
<body>

<div id="status">Déconnecté</div>

<div style="padding:10px">
    <input id="name" placeholder="votre non" required>
    <button onclick="join()">Rejoindre</button>
</div>

<div id="chat"></div>

<div style="padding:10px">
    <input id="msg" placeholder="Message">
    <button id="sendBtn" onclick="send()" disabled>Envoyer</button>
</div>

<script>

let ws = null;

function join(){

    const name = document.getElementById("name").value.trim();

    if(name===""){
        alert("Entre un pseudo");
        return;
    }

    ws = new WebSocket("wss://chatapp-2g1r.onrender.com");

    ws.onopen = () => {

        document.getElementById("status").innerHTML =
            "Connecté";

        document.getElementById("sendBtn").disabled = false;

        ws.send(JSON.stringify({
            type:"join",
            name:name
        }));
    };

    ws.onerror = () => {
        document.getElementById("status").innerHTML =
            "Erreur WebSocket";
    };

    ws.onclose = () => {
        document.getElementById("status").innerHTML =
            "Déconnecté";

        document.getElementById("sendBtn").disabled = true;
    };

    ws.onmessage = (event)=>{

        const data = JSON.parse(event.data);

        if(data.type==="history"){
            data.messages.forEach(render);
            return;
        }

        render(data);
    };
}

function render(data){

    const chat = document.getElementById("chat");

    const div = document.createElement("div");

    if(data.type==="chat"){
        div.className="msg";
        div.innerHTML =
            "<b>"+data.name+":</b> "+data.message;
    }

    if(data.type==="system"){
        div.className="system";
        div.textContent = data.message;
    }

    chat.appendChild(div);

    chat.scrollTop = chat.scrollHeight;
}

function send(){

    if(!ws) return;

    const txt =
        document.getElementById("msg").value.trim();

    if(txt==="") return;

    ws.send(JSON.stringify({
        type:"chat",
        message:txt
    }));

    document.getElementById("msg").value="";
}

</script>

</body>
</html>
